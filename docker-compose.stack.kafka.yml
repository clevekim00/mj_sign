services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: mj-sign-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=1
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
      - ALLOW_PLAINTEXT_LISTENER=yes

  mock-gpu:
    image: python:3.11-slim
    container_name: mj-sign-mock-gpu
    working_dir: /workspace/sign_gemma_mock
    volumes:
      - .:/workspace
    command: >
      /bin/sh -lc
      "pip install --no-cache-dir fastapi uvicorn protobuf &&
      python main.py"
    ports:
      - "8000:8000"

  bridge:
    image: gradle:8.10.2-jdk21
    container_name: mj-sign-bridge-kafka
    working_dir: /workspace/sign_bridge
    volumes:
      - .:/workspace
      - gradle-cache:/home/gradle/.gradle
    command: >
      /bin/sh -lc
      "./gradlew bootRun --args='--spring.profiles.active=kafka --sign.gpu.base-url=http://mock-gpu:8000 --spring.kafka.bootstrap-servers=kafka:9092'"
    depends_on:
      - kafka
      - mock-gpu
    ports:
      - "8080:8080"

volumes:
  gradle-cache:
