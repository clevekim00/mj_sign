# Sample RabbitMQ retry and DLQ settings for local/production adaptation.
# These settings are illustrative and should be tuned per environment.

sign.gpu.queue-request-topic=sign.inference.requests
sign.gpu.queue-result-topic=sign.inference.results
sign.gpu.queue-exchange=sign.inference
sign.gpu.queue-routing-key=sign.inference.request
sign.gpu.queue-result-routing-key=sign.inference.result

# Suggested retry / DLQ naming
sign.gpu.queue-retry-queue=sign.inference.retry
sign.gpu.queue-dlq-queue=sign.inference.dlq
sign.gpu.queue-max-attempts=3
sign.gpu.queue-retry-backoff-ms=2000

# Useful Spring AMQP listener defaults
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.prefetch=10
spring.rabbitmq.listener.simple.default-requeue-rejected=false
