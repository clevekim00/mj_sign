sign.gpu.provider=http
sign.gpu.base-url=http://localhost:8000
sign.gpu.infer-path=/api/v2/recognize
sign.gpu.health-path=/
sign.gpu.grpc-target=dns:///localhost:50051
sign.gpu.queue-transport=in-memory
sign.gpu.queue-broker-mode=loopback
sign.gpu.queue-topic=sign.inference.requests
sign.gpu.queue-request-topic=sign.inference.requests
sign.gpu.queue-result-topic=sign.inference.results
sign.gpu.queue-consumer-group=sign-bridge
sign.gpu.queue-exchange=sign.inference
sign.gpu.queue-routing-key=sign.inference.request
sign.gpu.queue-result-routing-key=sign.inference.result
sign.gpu.queue-timeout-ms=5000
sign.gpu.timeout-ms=2000
sign.gpu.probe-timeout-ms=1000
sign.websocket.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*
sign.window.min-frames=8
sign.window.max-buffered-frames=24
sign.window.idle-timeout-ms=1200
sign.window.flush-threads=1
sign.async.core-pool-size=2
sign.async.max-pool-size=4
sign.async.queue-capacity=16
