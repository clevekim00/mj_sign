# Sample Kafka retry and DLQ settings for local/production adaptation.
# These settings are illustrative and should be tuned per environment.

sign.gpu.queue-request-topic=sign.inference.requests
sign.gpu.queue-result-topic=sign.inference.results

# Suggested retry / DLQ topic naming
sign.gpu.queue-retry-topic=sign.inference.retry
sign.gpu.queue-dlq-topic=sign.inference.dlq
sign.gpu.queue-max-attempts=3
sign.gpu.queue-retry-backoff-ms=2000

# Useful Spring Kafka listener defaults
spring.kafka.listener.ack-mode=record
spring.kafka.listener.concurrency=1
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.max-poll-records=10
